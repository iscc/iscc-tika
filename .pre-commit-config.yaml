---
# Quality gates for iscc-tika
# Install hooks: prek install
# Run all: prek run --all-files
# Run auto-fix only: prek run --stage pre-commit --all-files
repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=256]
      - id: fix-byte-order-marker

  # Markdown formatting
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [--wrap, '100', --number]
        additional_dependencies:
          - mdformat-mkdocs[recommended]

  # Local hooks
  - repo: local
    hooks:
      # Pre-commit hooks (fast, auto-fix)
      - id: cargo-fmt
        name: Rust formatting
        entry: bash -c 'cargo fmt --manifest-path iscc-tika-core/Cargo.toml && cargo
          fmt --manifest-path bindings/iscc-tika-python/Cargo.toml'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-check
        name: Ruff linting
        entry: ruff check --fix
        language: system
        types: [python]
        stages: [pre-commit]
      - id: ruff-format
        name: Ruff formatting
        entry: ruff format
        language: system
        types: [python]
        stages: [pre-commit]
      - id: taplo
        name: TOML formatting
        entry: taplo fmt
        language: system
        types: [toml]
        stages: [pre-commit]
      - id: yamlfix
        name: YAML formatting
        entry: yamlfix
        language: system
        types: [yaml]
        stages: [pre-commit]

      # Pre-push hooks (thorough quality gates)
      - id: cargo-clippy
        name: Rust linting
        entry: bash -c 'cargo clippy --manifest-path iscc-tika-core/Cargo.toml --
          -D warnings && cargo clippy --manifest-path bindings/iscc-tika-python/Cargo.toml
          -- -D warnings'
        language: system
        always_run: true
        stages: [pre-push]
        pass_filenames: false
      - id: cargo-test
        name: Rust tests
        entry: cargo test --manifest-path iscc-tika-core/Cargo.toml
        language: system
        always_run: true
        stages: [pre-push]
        pass_filenames: false
      - id: security
        name: Security scan (Ruff S rules)
        entry: ruff check --select S --force-exclude
        language: system
        always_run: true
        stages: [pre-push]
        pass_filenames: false
      - id: complexity
        name: Complexity check (Ruff C901)
        entry: ruff check --select C901 --force-exclude
        language: system
        always_run: true
        stages: [pre-push]
        pass_filenames: false
      - id: pytest
        name: Python tests
        entry: bash -c 'cd bindings/iscc-tika-python && uv run pytest -s --timeout=120'
        language: system
        always_run: true
        stages: [pre-push]
        pass_filenames: false
